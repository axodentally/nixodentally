theme = "papercolor-light"

# different light and dark themes
# [theme]
# light = "papercolor-light"
# dark = "papercolor-dark"


[editor]
color-modes = true
rulers = [120]
text-width = 120


[editor.bufferline]
render-mode = "always"
separator = ""

[editor.cursor-shape]
insert = "bar"

[editor.lsp]
display-inlay-hints = true
display-messages = true
# see here https://github.com/helix-editor/helix/pull/15221
auto-document-highlight = true 

[editor.soft-wrap]
enable = true

[editor.statusline]
left = [
    "mode",
    "file-name",
    "function-name",
    "version-control",
    "read-only-indicator",
    "file-modification-indicator"
]
right = [
    "spinner",
    "diagnostics",
    "file-type",
    "file-encoding",
    "selections",
    "register",
    "position",
]

[editor.statusline.mode]
insert = "INSERT"
normal = "NORMAL"
select = "SELECT"


# [editor.inline-blame]
