# # ========================================== Notifications ==========================================
# [editor.notifications]
# enable = true
# padding = 0
# shadow = { enable = false }


# =============================================== Icons ===============================================
[icons.kind]
enabled = true

[icons.vcs]
enabled = true

[icons.mime]
enabled = true

[icons.diagnostic]
enabled = true
error = ""
warning = " "
info = " "
hint = ""

# # ==== keys ====

[keys.normal]
C-l = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
C-p = [":sh typst watch ./*.typ & zathura ./*.pdf"]
# Yazi in helix
# see: https://yazi-rs.github.io/docs/tips/#helix
C-y = [
	':sh rm -f /tmp/unique-ca1ea106',
	':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-ca1ea106',
	':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
	':open %sh{cat /tmp/unique-ca1ea106}',
	':redraw',
	':set mouse false',
  ':set mouse true',
]

[keys.normal.space]
o = "file_picker_in_current_buffer_directory"

